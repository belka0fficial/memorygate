services:
  postgres:
    image: postgres:16
    container_name: memorygate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memorygate
      POSTGRES_PASSWORD: memorygate_dev_password
      POSTGRES_DB: memorygate
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: memorygate-qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
